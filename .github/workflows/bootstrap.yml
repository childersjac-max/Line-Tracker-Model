name: 0. Bootstrap Historical Data (Run Once)

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bootstrap
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python bootstrap_history.py

      - name: Train models on bootstrapped data
        run: python train.py --sport all --market all --synthetic --min-samples 10

      - name: Generate first slate
        run: python pipeline.py --mode predict --bankroll 10000 --min-signals 0

      - name: Commit everything
        run: |
          git config user.name  "jlab-bot"
          git config user.email "bot@jlab.com"
          git pull --rebase origin main
          git add line_history/ saved_models/ pipeline_output/ || true
          git commit -m "Bootstrap: historical data + first models" || echo "No changes"
          git push origin main
