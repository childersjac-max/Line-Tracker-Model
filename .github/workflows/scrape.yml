name: 1. Scrape + Track

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  scrape_and_track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python pipeline.py --mode scrape

      - name: Update line history
        run: python pipeline.py --mode track

      - name: Commit data
        run: |
          git config user.name  "jlab-bot"
          git config user.email "bot@jlab.com"
          git fetch origin main
          git reset --soft origin/main
          git add jlab_data/ line_history/ injury_cache.json splits_cache.json || true
          git commit -m "Lines + injuries + splits $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push origin main
