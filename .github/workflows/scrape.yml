name: 1. Scrape + Track

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 20 * * *'
    - cron: '0 1  * * *'
  workflow_dispatch:

jobs:
  scrape_and_track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python pipeline.py --mode scrape

      - name: Update line history
        run: python pipeline.py --mode track
        env:
          PYTHONPATH: .

      - name: Commit data
        run: |
          git config user.name  "jlab-bot"
          git config user.email "bot@jlab.com"
          git pull --rebase origin main
          git add jlab_data/ line_history/ || true
          git commit -m "Lines $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push origin main
          
